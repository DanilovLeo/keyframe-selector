# experiment.yaml — single source of truth for the evaluation grid.
#
# Edit the grid HERE and nowhere else. The values below previously lived as
# literals duplicated across six scripts (the K-sweep / seeds / method list);
# they are now read from this file so the published configuration cannot drift
# between the eval, the bundle export, and the diagnostics.
#
# Flow of the grid through the pipeline:
#   * Generators  — run_retrieval_eval.py and export_eval_bundle.py read these
#                   values to build the extractor grid. plot_results.py reads
#                   them for its --mock data generators.
#   * Bundle      — export_eval_bundle.py stamps k_sweep / random_seeds /
#                   methods into results/bundle/bundle_meta.json.
#   * Diagnostics — scripts/diagnostics/* read the grid back from the bundle
#                   metadata (Bundle.k_sweep / .random_seeds / .methods), NOT
#                   from this file, so they always match the bundle they were
#                   handed and stay numpy-only (no yaml import on the CPU path).
#
# Pinned by docs/decisions.md and the README. Changing k_sweep or random_seeds
# requires re-running the GPU export so the bundle's stamped grid matches.

# Frame budgets for the compression sweep (K in K/T). Reported as a sweep,
# never a single K (see configs/CLAUDE evaluation protocol).
k_sweep: [4, 8, 16, 32]

# Seeds for the random baseline (matched-N control). At least 3; reported as
# mean +/- std. Frame 0 and T-1 are always included by every extractor.
random_seeds: [42, 123, 456]

# Methods compared. Order is the canonical reporting order. uniform/random are
# the baselines; optical_flow/attention/frame_diff are the CV extractors.
methods: [uniform, random, optical_flow, attention, frame_diff]

# Dataset sampling for the bundle/eval. Previously these lived only as argparse
# defaults duplicated in run_retrieval_eval.py and export_eval_bundle.py; they
# are now the single source of truth here and are stamped into
# results/bundle/bundle_meta.json so a bundle records exactly how it was sampled.
# The CLI flags (--min_demos / --max_tasks / --max_episodes) still override these
# for ad-hoc runs; when omitted, the scripts fall back to the values below.
#   * min_demos    — keep only tasks with at least this many episodes.
#   * max_tasks    — cap the number of tasks (20 = the primary reported sample;
#                    raise to 100 for the scale-up bundle — same dataset/view, so
#                    no new scope approval, see docs/decisions.md 2026-06-12).
#   * max_episodes — cap episodes per task (matched-N across tasks).
sampling:
  min_demos: 20
  max_tasks: 20
  max_episodes: 50
